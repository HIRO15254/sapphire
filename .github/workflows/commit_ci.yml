name: Commit CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-lint-deps-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-lint-deps-

    - name: Install dependencies
      run: bun install

    - name: Run lint
      run: bun run lint

  test:
    name: Test
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-test-deps-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-test-deps-

    - name: Install dependencies
      run: bun install

    - name: Run tests
      run: bun run test:all