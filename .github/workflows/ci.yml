name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-${{ matrix.os }}-deps-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.os }}-deps-
          
    - name: Install dependencies
      run: bun install
      
    - name: Run all tests
      run: bun run test:all
      
    - name: Lint Rust code
      run: cd src-tauri && cargo fmt --all -- --check
      
    - name: Clippy check
      run: cd src-tauri && cargo clippy -- -D warnings
      
    - name: Build project
      run: bun run build

  build-tauri:
    name: Build Tauri App
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
        
    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-build-
          
    - name: Install dependencies
      run: bun install
      
    - name: Build Tauri app
      run: bun run tauri build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: tauri-app-${{ matrix.os }}
        path: |
          src-tauri/target/release/bundle/
        retention-days: 30