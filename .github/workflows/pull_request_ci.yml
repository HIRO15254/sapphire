name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run frontend tests with coverage
      run: bun run test

  test-rust:
    name: Rust Tests
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          src-tauri/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run Rust tests
      run: |
        cd src-tauri
        cargo test -- --test-threads=1


  test-e2e:
    name: E2E Tests
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Install Edge WebDriver
      run: |
        # Get latest stable version
        Write-Host "Getting latest Edge WebDriver version..."
        $latestVersion = Invoke-RestMethod -Uri "https://msedgedriver.azureedge.net/LATEST_STABLE"
        Write-Host "Latest version: $latestVersion"

        # Download latest stable Edge WebDriver
        $downloadUrl = "https://msedgedriver.azureedge.net/$latestVersion/edgedriver_win64.zip"
        Write-Host "Downloading from: $downloadUrl"
        Invoke-WebRequest -Uri $downloadUrl -OutFile "edgedriver.zip"

        # Extract and setup
        Expand-Archive -Path "edgedriver.zip" -DestinationPath "edgedriver" -Force
        $driverPath = Join-Path $PWD "edgedriver"

        # Add to PATH
        $env:PATH += ";$driverPath"
        [Environment]::SetEnvironmentVariable("PATH", "$env:PATH", "Process")

        # Verify installation
        Write-Host "WebDriver location: $driverPath"
        Get-ChildItem $driverPath -Name "msedgedriver.exe"
        & "$driverPath\msedgedriver.exe" --version
      shell: powershell

    - name: Install tauri-driver
      run: cargo install tauri-driver --locked

    - name: Install dependencies
      run: bun install

    - name: Install E2E dependencies
      run: |
        cd e2e-tests
        npm install

    - name: Build Tauri app for testing
      run: bun tauri build --debug --no-bundle
      env:
        TAURI_TEST_MODE: "1"

    - name: Run E2E tests
      run: |
        # Add current WebDriver path to environment
        $driverPath = Join-Path $PWD "edgedriver"
        $env:PATH += ";$driverPath"

        Write-Host "Current working directory: $PWD"
        Write-Host "WebDriver path: $driverPath"
        Write-Host "WebDriver exists: $(Test-Path (Join-Path $driverPath 'msedgedriver.exe'))"

        # Try to find executables
        if (Get-Command msedgedriver.exe -ErrorAction SilentlyContinue) {
          Write-Host "Found msedgedriver: $(Get-Command msedgedriver.exe | Select-Object -ExpandProperty Source)"
        } else {
          Write-Host "msedgedriver not found in PATH"
        }

        if (Get-Command tauri-driver.exe -ErrorAction SilentlyContinue) {
          Write-Host "Found tauri-driver: $(Get-Command tauri-driver.exe | Select-Object -ExpandProperty Source)"
        } else {
          Write-Host "tauri-driver not found in PATH"
        }

        cd e2e-tests
        npm run test:clean
      env:
        TAURI_TEST_MODE: "1"
        CI: "true"
      shell: powershell

    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: e2e-test-results-windows
        path: |
          e2e-tests/test-results/
          e2e-tests/allure-results/
        retention-days: 30

    - name: Upload test logs
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: e2e-logs-windows
        path: |
          e2e-tests/*.log
          src-tauri/target/debug/deps/*.log
        retention-days: 7

  lint:
    name: Lint & Format Check
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install dependencies
      run: bun install

    - name: Check Frontend formatting
      run: bun run biome format .

    - name: Check Frontend linting
      run: bun run biome lint .

    - name: Check Rust formatting
      run: |
          cd src-tauri
          cargo fmt -- --check

    - name: Check Rust linting
      run: |
          cd src-tauri
          cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build Test
    runs-on: windows-latest
    needs: [test-frontend, test-rust, lint]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: bun install

    - name: Build application
      run: bun run build
