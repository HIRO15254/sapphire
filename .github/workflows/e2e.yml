name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 手動実行可能

jobs:
  e2e-test:
    name: E2E Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest] # macOSはWebDriverサポートなし
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
        
    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev pkg-config
        # WebKitWebDriverのインストール
        sudo apt-get install -y webkit2gtk-driver
        
    - name: Install Tauri WebDriver
      run: cargo install tauri-driver --locked
      
    - name: Setup WebDriver (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Microsoft Edge WebDriverのインストール
        cargo install --git https://github.com/chippers/msedgedriver-tool
        msedgedriver-tool
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-e2e-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-e2e-
          
    - name: Install dependencies
      run: bun install
      
    - name: Build Tauri app for testing
      run: bun run tauri build
      
    - name: Run E2E tests
      run: bun run test:e2e
      env:
        CI: true
        
    - name: Upload E2E test screenshots (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-screenshots-${{ matrix.os }}
        path: |
          test/e2e/screenshots/
          test/e2e/logs/
        retention-days: 7