# Windows E2E testing workflow
name: E2E Tests - Windows

on:
  workflow_dispatch: # Manual trigger
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src-tauri/**'
      - 'e2e-tests/**'
      - '.github/workflows/e2e-alternative.yml'

jobs:
  # Windows WebDriver E2E Tests
  e2e-webdriver-windows:
    name: E2E - Windows WebDriver
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Install Edge WebDriver
      run: |
        cargo install --git https://github.com/chippers/msedgedriver-tool
        msedgedriver-tool

    - name: Install tauri-driver
      run: cargo install tauri-driver --locked

    - name: Install dependencies
      run: bun install

    - name: Install E2E dependencies
      run: |
        cd e2e-tests
        npm install

    - name: Build Tauri app
      run: bun tauri build --debug --no-bundle
      env:
        TAURI_TEST_MODE: "1"

    - name: Run WebDriver E2E tests
      run: |
        cd e2e-tests
        npm run test:clean
      env:
        TAURI_TEST_MODE: "1"
        CI: "true"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-webdriver-windows-results
        path: |
          e2e-tests/test-results/
          e2e-tests/allure-results/
        retention-days: 7

  # Frontend Component Tests
  component-tests:
    name: Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run component tests
      run: bun run test:run

    - name: Check build compatibility
      run: bun run build

  # Summary job
  e2e-results:
    name: E2E Test Results Summary
    runs-on: ubuntu-latest
    needs: [e2e-webdriver-windows, component-tests]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "E2E Test Results Summary:"
        echo "Windows WebDriver: ${{ needs.e2e-webdriver-windows.result }}"
        echo "Component Tests: ${{ needs.component-tests.result }}"

        # Fail if any tests failed
        if [[ "${{ needs.component-tests.result }}" == "failure" ]]; then
          echo "Component tests failed!"
          exit 1
        fi

        if [[ "${{ needs.e2e-webdriver-windows.result }}" == "failure" ]]; then
          echo "Windows WebDriver E2E tests failed!"
          exit 1
        fi

        echo "All tests passed successfully!"