name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  actions: read

jobs:
  # Check if all tests have passed on the main branch
  check-tests:
    name: Check Tests Status
    runs-on: ubuntu-latest
    steps:
    - name: Check latest workflow run on main
      uses: actions/github-script@v7
      with:
        script: |
          const { data: workflows } = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'Tests',
            branch: 'main',
            per_page: 1
          });

          if (workflows.total_count === 0) {
            core.setFailed('No test runs found on main branch');
            return;
          }

          const latestRun = workflows.workflow_runs[0];
          if (latestRun.conclusion !== 'success') {
            core.setFailed(`Latest test run on main branch failed: ${latestRun.html_url}`);
            return;
          }

          console.log(`Latest test run passed: ${latestRun.html_url}`);

  lint:
    name: Lint
    runs-on: windows-latest
    needs: [check-tests]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-release-lint-deps-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-release-lint-deps-

    - name: Install dependencies
      run: bun install

    - name: Run lint
      run: bun run lint

  test:
    name: Test
    runs-on: windows-latest
    needs: [check-tests]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: ${{ runner.os }}-release-test-deps-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          ${{ runner.os }}-release-test-deps-

    - name: Install dependencies
      run: bun install

    - name: Run tests
      run: bun run test:all

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: [lint, test]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: windows-release-build-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          windows-release-build-

    - name: Install dependencies
      run: bun install

    - name: Build Tauri Windows app
      run: bun run tauri build

    - name: Upload Windows build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tauri-app-windows-release
        path: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
        retention-days: 30

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      NDK_VERSION: "29.0.14033849"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager "ndk;${{ env.NDK_VERSION }}"

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          node_modules
          src-tauri/target
        key: android-release-build-${{ hashFiles('**/Cargo.lock', '**/bun.lockb', '**/package.json') }}
        restore-keys: |
          android-release-build-

    - name: Install dependencies
      run: bun install

    - name: Install Tauri Android dependencies
      run: |
        bun run tauri android init

    - name: Setup Android Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > src-tauri/gen/android/app/release.jks
        echo "storeFile=release.jks" >> src-tauri/gen/android/keystore.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> src-tauri/gen/android/keystore.properties
        echo "password=${{ secrets.KEY_PASSWORD }}" >> src-tauri/gen/android/keystore.properties

    - name: Build Tauri Android app (Release)
      run: bun run tauri android build
      env:
        NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

    - name: Upload Android build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tauri-app-android-release
        path: |
          src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        retention-days: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Windows artifacts
      uses: actions/download-artifact@v4
      with:
        name: tauri-app-windows-release
        path: ./windows-artifacts/

    - name: Download Android artifacts
      uses: actions/download-artifact@v4
      with:
        name: tauri-app-android-release
        path: ./android-artifacts/

    - name: Get version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          🚀 **Sapphire Release ${{ steps.get_version.outputs.version }}**
          
          ## 📦 Downloads
          - **Windows**: Download the `.msi` or `.exe` installer below
          - **Android**: Download the `.apk` file below
          
          ## 🔄 Changes
          See the full changelog below for all changes included in this release.
          
          ---
          *This release was automatically built and published via GitHub Actions.*
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./windows-artifacts/msi/*.msi
          ./windows-artifacts/nsis/*.exe
          ./android-artifacts/*.apk
